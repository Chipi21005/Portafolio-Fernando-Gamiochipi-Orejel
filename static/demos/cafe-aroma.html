const detectIntent = (text) => {
  const t = text.toLowerCase();
  if (/hola|buenas|hey|buen d|buen t|buen n/.test(t)) return 'greeting';
  if (/sin lactosa|lactosa|intolerante|vegano|sin gl[uú]ten|celiaco|alergi/.test(t)) return 'sin_lactosa';
  if (/men[uú]|carta|qu[eé] tienen|qu[eé] hay|opciones|precios/.test(t)) return 'menu';
  if (/queja|mal|p[eé]simo|decepcionado|problema|fr[ií]o|tarde|equivocad|reclamo/.test(t)) return 'queja';
  if (/cumplea[ñn]|festejo|celebraci[oó]n|aniversario/.test(t)) return 'reservacion_cumpleanos';
  if (/reserva|mesa|espacio|sentar/.test(t)) return 'reservacion';
  if (/pedido|orden|quiero|pedir|llevar|recoger/.test(t)) return 'pedido';
  if (/punto|membresia|membres[ií]a|lealtad|recompensa|saldo|nivel/.test(t)) return 'membresia';
  if (/horario|abierto|abren|cierran|horas/.test(t)) return 'horarios';
  if (/agente|persona|humano|hablar con|ayuda real/.test(t)) return 'agente';
  return 'default';
};

const getBotResponse = (intent, conv) => {
  const name = conv.contact.name;
  const pts = conv.contact.points || 0;
  switch (intent) {
    case 'greeting': return BOT_RESPONSES.greeting(name);
    case 'menu': return BOT_RESPONSES.menu();
    case 'sin_lactosa': return BOT_RESPONSES.sin_lactosa();

    case 'pedido': return BOT_RESPONSES.pedido_confirmar('• 1x Latte de vainilla — $60\n• 1x Tostadas de aguacate — $75');
    case 'membresia': return BOT_RESPONSES.membresia(pts, name);
    case 'horarios': return BOT_RESPONSES.horarios();
    case 'agente': return 'Te estoy transfiriendo con un agente. Un momento por favor...';
    default: return BOT_RESPONSES.default();
  }
};

function Avatar({ name, size = 'md', online = false }) {
  const sz = size === 'sm' ? 32 : size === 'lg' ? 48 : 40;
  const fs = size === 'sm' ? 12 : size === 'lg' ? 18 : 14;
  return (
    <div style={{ position: 'relative', flexShrink: 0 }}>
      <div style={{ width: sz, height: sz, borderRadius: '50%', background: avatarColor(name), display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontSize: fs, fontWeight: 700 }}>
        {initials(name)}
      </div>
      {online && <div style={{ position: 'absolute', bottom: 1, right: 1, width: 10, height: 10, borderRadius: '50%', background: '#25d366', border: '2px solid white' }} />}
    </div>
  );
}

function StatusBadge({ mode }) {
  const cfg = {
    bot: { label: 'Bot', bg: '#e0f2fe', color: '#0369a1' },
    agent: { label: 'Agente', bg: '#dcfce7', color: '#15803d' },
    pending: { label: 'Pendiente', bg: '#fef3c7', color: '#92400e' },
  };
  const c = cfg[mode] || cfg.bot;
  return <span style={{ background: c.bg, color: c.color, borderRadius: 12, padding: '2px 8px', fontSize: 11, fontWeight: 600 }}>{c.label}</span>;
}

function WaText({ text }) {
  if (!text) return null;
  const parts = text.split(/(\*[^*]+\*)/g);
  return (
    <span style={{ whiteSpace: 'pre-wrap', lineHeight: 1.5 }}>
      {parts.map((p, i) =>
        p.startsWith('*') && p.endsWith('*')
          ? <strong key={i}>{p.slice(1, -1)}</strong>
          : p
      )}
    </span>
  );
}

function Typing() {
  return (

}

function MsgBubble({ msg }) {
  if (msg.from === 'system') {
    return (
      <div style={{ textAlign: 'center', margin: '8px 0' }}>
        <span style={{ background: 'rgba(255,255,255,0.8)', color: '#667781', fontSize: 11, padding: '4px 12px', borderRadius: 8 }}>{msg.text}</span>

    );

  const isOut = msg.from !== 'client';
  const bg = isOut ? '#d9fdd3' : 'white';
  return (
    <div className="msg-anim" style={{ display: 'flex', justifyContent: isOut ? 'flex-end' : 'flex-start', marginBottom: 4 }}>

        {isOut && msg.from === 'agent' && <div style={{ fontSize: 10, color: '#6F4E37', fontWeight: 600, marginBottom: 2 }}>Agente</div>}

function ChatPanel({ conv, onSend, onTakeControl, onReturnBot, showProfile, onToggleProfile, onExport }) {
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef(null);
  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [conv?.messages]);

  if (!conv) return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f0f2f5' }}>
      <div style={{ textAlign: 'center', color: '#9ca3af' }}>
        <div style={{ fontSize: 16, fontWeight: 500 }}>Selecciona una conversación</div>
      </div>
    </div>
  );

  const send = () => {
    if (!input.trim() || conv.mode === 'bot') return;
    onSend(conv.id, input.trim(), 'agent');
    setInput('');
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
      {/* Chat header */}
      <div style={{ padding: '10px 16px', background: 'white', borderBottom: '1px solid #e9ecef', display: 'flex', alignItems: 'center', gap: 10 }}>
        <Avatar name={conv.contact.name} online={conv.mode === 'agent'} />
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{conv.contact.name}</div>
          <div style={{ fontSize: 12, color: '#667781', display: 'flex', alignItems: 'center', gap: 8 }}>
            <StatusBadge mode={conv.mode} />
            {conv.mode === 'agent' && conv.contact.agent && <span>→ {conv.contact.agent}</span>}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button onClick={onExport} title="Exportar conversación" style={{ background: '#f0f2f5', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 13 }}>Exportar</button>
          <button onClick={onToggleProfile} title="Ver perfil" style={{ background: showProfile ? BRAND.light : '#f0f2f5', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 13, color: showProfile ? BRAND.color : '#374151', fontWeight: showProfile ? 700 : 400 }}>Perfil</button>
        </div>
      </div>

      {/* Mode banner */}
      <div style={{ padding: '8px 16px', background: conv.mode === 'agent' ? '#f0fdf4' : conv.mode === 'pending' ? '#fffbeb' : '#eff6ff', borderBottom: '1px solid #e9ecef', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: conv.mode === 'agent' ? '#15803d' : conv.mode === 'pending' ? '#92400e' : '#1d4ed8', fontWeight: 600 }}>
          {conv.mode === 'bot' && 'Bot respondiendo automáticamente'}
          {conv.mode === 'agent' && 'Agente en control — puedes responder'}
          {conv.mode === 'pending' && 'Sin responder — cliente esperando'}
        </span>
        <div style={{ display: 'flex', gap: 6 }}>
          {(conv.mode === 'bot' || conv.mode === 'pending') && (
            <button onClick={() => onTakeControl(conv.id)} style={{ background: '#15803d', color: 'white', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Tomar control</button>
          )}
          {conv.mode === 'agent' && (
            <button onClick={() => onReturnBot(conv.id)} style={{ background: '#1d4ed8', color: 'white', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Devolver al bot</button>
          )}
        </div>
      </div>

      {/* Messages */}
      <div className="wa-bg" style={{ flex: 1, overflowY: 'auto', padding: '12px 16px', display: 'flex', flexDirection: 'column' }}>
        {conv.messages.map(msg => <MsgBubble key={msg.id} msg={msg} />)}
        {typing && <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 4 }}><Typing /></div>}
        <div ref={messagesEndRef} />
      </div>

      {/* Input */}
      <div style={{ padding: '8px 12px', background: 'white', borderTop: '1px solid #e9ecef', display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        {conv.mode === 'bot' && (
          <div style={{ flex: 1, background: '#f0f2f5', borderRadius: 24, padding: '10px 16px', fontSize: 13, color: '#9ca3af', display: 'flex', alignItems: 'center', gap: 6 }}>
            El bot está manejando esta conversación. Haz clic en "Tomar control" para responder.
          </div>
        )}
        {conv.mode !== 'bot' && (
          <>
            <textarea
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder="Escribe un mensaje..."
              rows={1}
              style={{ flex: 1, border: '1px solid #e5e7eb', borderRadius: 24, padding: '10px 16px', fontSize: 13, resize: 'none', outline: 'none', fontFamily: 'inherit', maxHeight: 100, overflow: 'auto' }}
            />
            <button onClick={send} style={{ background: BRAND.color, color: 'white', border: 'none', borderRadius: '50%', width: 40, height: 40, fontSize: 16, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>➤</button>
          </>
        )}
      </div>
    </div>
  );
}

function PhoneSimulator({ convs, onReceive, onClose }) {
  const [selId, setSelId] = useState(convs[0]?.id || '');
  const [msg, setMsg] = useState('');
  const [flash, setFlash] = useState(false);
  const selConv = convs.find(c => c.id === selId);

  const send = () => {
    if (!msg.trim() || !selId) return;
    onReceive(selId, msg.trim());
    setMsg('');
    setFlash(true);
    setTimeout(() => setFlash(false), 800);
  };

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)' }}>

          {/* Notch */}

          <div style={{ fontSize: 11, color: '#9ca3af', marginBottom: 8 }}>Mensajes de prueba:</div>
          {['Hola, ¿qué opciones sin lactosa tienen?', '¿Me pueden hacer un pedido para llevar?', 'Quiero reservar para cumpleaños', 'Tuve un problema con mi pedido 😤', '¿Cuántos puntos tengo?'].map(s => (
            <div key={s} onClick={() => setMsg(s)} style={{ fontSize: 11, color: '#6F4E37', cursor: 'pointer', padding: '3px 6px', borderRadius: 6, marginBottom: 3, background: '#f9fafb', border: '1px solid #f0f2f5' }}
              onMouseEnter={e => e.currentTarget.style.background = '#F5E6D3'}
              onMouseLeave={e => e.currentTarget.style.background = '#f9fafb'}>
              "{s.slice(0, 42)}{s.length > 42 ? '...' : ''}"
            </div>
          ))}
          <button onClick={send} style={{ width: '100%', background: '#25d366', color: 'white', border: 'none', borderRadius: 10, padding: '10px', fontSize: 13, fontWeight: 700, cursor: 'pointer', marginTop: 8 }}>Enviar mensaje ➤</button>
          <button onClick={onClose} style={{ width: '100%', background: '#f0f2f5', color: '#374151', border: 'none', borderRadius: 10, padding: '8px', fontSize: 12, cursor: 'pointer', marginTop: 6 }}>Cerrar (ESC)</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const ref = useRef({});
  const [convs, setConvs] = useState(INITIAL_CONVS.map(c => ({ ...c, notes: '' })));
  const [selId, setSelId] = useState('c1');
  const [showPhone, setShowPhone] = useState(false);
  const [showProfile, setShowProfile] = useState(true);
  const [showKpi, setShowKpi] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [kpi, setKpi] = useState(KPI_INIT);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  ref.current = { convs, selId };

  // Push toast
  const pushToast = useCallback((name, text, convId) => {
    const id = uid();
    setToasts(t => [...t, { id, name, text, convId }]);
    setTimeout(() => setToasts(t => t.map(x => x.id === id ? { ...x, out: true } : x)), 3500);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3800);
  }, []);

  // Receive message from client
  const receiveMsg = useCallback((convId, text) => {
    const { selId: curSel } = ref.current;
    const msg = { id: uid(), from: 'client', text, time: nowTime() };
    setConvs(cs => cs.map(c => {
      if (c.id !== convId) return c;
      const updated = { ...c, messages: [...c.messages, msg], lastMsg: text, lastTime: nowTime(), unread: c.id !== curSel ? (c.unread || 0) + 1 : 0 };
      // Auto-bot response
      if (c.mode === 'bot' || c.mode === 'pending') {
        const intent = detectIntent(text);
        const shouldEscalate = intent === 'queja' || intent === 'agente';
        const botText = getBotResponse(intent, c);
        const botMsg = { id: uid(), from: 'bot', text: botText, time: nowTime() };
        if (shouldEscalate) {
          const sysMsg = { id: uid(), from: 'system', text: 'Escalando a agente humano...', time: nowTime() };
          setTimeout(() => {
            setConvs(cs2 => cs2.map(c2 => c2.id !== convId ? c2 : { ...c2, mode: 'agent', messages: [...c2.messages, sysMsg], lastMsg: botText, lastTime: nowTime() }));
            setKpi(k => ({ ...k, totalToday: k.totalToday + 1 }));
          }, 1200);
          return { ...updated, messages: [...updated.messages, botMsg], lastMsg: botText };
        } else {
          setTimeout(() => {
            setConvs(cs2 => cs2.map(c2 => c2.id !== convId ? c2 : { ...c2, mode: 'bot', messages: [...c2.messages, botMsg], lastMsg: botText, lastTime: nowTime() }));
            setKpi(k => ({ ...k, botResolved: k.botResolved + 1, totalToday: k.totalToday + 1 }));
          }, 1400);
          return updated;
        }
      }
      return updated;
    }));
    // Toast if not selected
    const { convs: ccs } = ref.current;
    const c = ccs.find(x => x.id === convId);
    if (c && convId !== ref.current.selId) pushToast(c.contact.name, text, convId);
  }, [pushToast]);

  // Auto messages
  useEffect(() => {
    const timers = AUTO_MSGS.map(({ convId, text, delay }) =>
      setTimeout(() => receiveMsg(convId, text), delay)
    );
    return () => timers.forEach(clearTimeout);
  }, [receiveMsg]);

  const sendMsg = (convId, text, from) => {
    const msg = { id: uid(), from, text, time: nowTime() };
    setConvs(cs => cs.map(c => c.id !== convId ? c : { ...c, messages: [...c.messages, msg], lastMsg: text, lastTime: nowTime() }));
  };

  const takeControl = (convId) => {
    const sysMsg = { id: uid(), from: 'system', text: 'Agente tomó el control de la conversación', time: nowTime() };
    setConvs(cs => cs.map(c => c.id !== convId ? c : { ...c, mode: 'agent', messages: [...c.messages, sysMsg], unread: 0 }));
  };

  const returnBot = (convId) => {
    const sysMsg = { id: uid(), from: 'system', text: 'Bot retomó la conversación automáticamente', time: nowTime() };
    setConvs(cs => cs.map(c => c.id !== convId ? c : { ...c, mode: 'bot', messages: [...c.messages, sysMsg] }));
  };

  const addTag = (convId, tag) => {
    setConvs(cs => cs.map(c => c.id !== convId ? c : { ...c, contact: { ...c.contact, tags: [...(c.contact.tags || []), tag] } }));
  };

  const updateNote = (convId, note) => {
    setConvs(cs => cs.map(c => c.id !== convId ? c : { ...c, notes: note }));
  };

  const selectConv = (id) => {
    setSelId(id);
    setConvs(cs => cs.map(c => c.id !== id ? c : { ...c, unread: 0 }));
  };

  const exportConv = () => {
    const conv = convs.find(c => c.id === selId);
    if (!conv) return;
    const txt = [`Café Aroma — Exportación de conversación`, `Cliente: ${conv.contact.name}`, `Teléfono: ${conv.contact.phone}`, `Fecha: ${new Date().toLocaleString('es-MX')}`, `Modo: ${conv.mode}`, `Notas: ${conv.notes || 'Sin notas'}`, '', '--- Mensajes ---', ...conv.messages.map(m => `[${m.time}] ${m.from === 'client' ? conv.contact.name : m.from === 'bot' ? 'BOT' : m.from === 'agent' ? 'AGENTE' : '---'}: ${m.text}`)].join('\n');
    navigator.clipboard?.writeText(txt).then(() => pushToast('Sistema', 'Conversación copiada al portapapeles ✓', null));
  };

  const activateScenario = (scenario) => {
    const scenarioMap = { s1: 'c1', s2: 'c1', s3: 'c3', s4: 'c4', s5: 'c2' };
    const convId = scenarioMap[scenario.id] || 'c1';
    const msgs = {
      s1: '¿Tienen opciones sin lactosa? Soy intolerante 🙏',
      s2: 'Quiero 2 lattes y un sandwich de pavo para recoger en Roma',
      s3: 'Hola! Quiero reservar para el cumpleaños de mi hija este sábado 🎂',
      s4: '¿Cuántos puntos tengo acumulados?',
      s5: 'Mi pedido llegó frío y el servicio estuvo muy mal 😤',
    };
    selectConv(convId);
    setTimeout(() => receiveMsg(convId, msgs[scenario.id] || ''), 300);
  };

  const resetDemo = () => {
    setConvs(INITIAL_CONVS.map(c => ({ ...c, notes: '' })));
    setSelId('c1');
    setToasts([]);
    setKpi(KPI_INIT);
    setSearch('');
    setFilter('all');
    setShowProfile(true);
  };

  const selConv = convs.find(c => c.id === selId) || null;
  const filteredConvs = convs.filter(c => {
    if (filter !== 'all' && c.mode !== filter) return false;
    if (search && !c.contact.name.toLowerCase().includes(search.toLowerCase()) && !c.lastMsg.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: '#f0f2f5' }}>
      {/* Top bar */}
      <div style={{ background: BRAND.color, padding: '0 16px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <a href="/" style={{ color: 'rgba(255,255,255,0.75)', fontSize: 12, fontWeight: 600, textDecoration: 'none', background: 'rgba(255,255,255,0.12)', borderRadius: 8, padding: '4px 10px', border: '1px solid rgba(255,255,255,0.2)' }}>← Portfolio</a>
          <div>
            <div style={{ color: 'white', fontWeight: 700, fontSize: 15, letterSpacing: '-0.01em' }}>Café Aroma</div>
            <div style={{ color: 'rgba(255,255,255,0.75)', fontSize: 11 }}>DevWhats — Panel de atención</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div style={{ display: 'flex', gap: 4 }}>
            {[
              { id: 'all', label: `Todas (${convs.length})` },
              { id: 'bot', label: `Bot (${convs.filter(c => c.mode === 'bot').length})` },
              { id: 'agent', label: `Agente (${convs.filter(c => c.mode === 'agent').length})` },
              { id: 'pending', label: `Pendiente (${convs.filter(c => c.mode === 'pending').length})` },
            ].map(f => (
              <button key={f.id} onClick={() => setFilter(f.id)}
                style={{ background: filter === f.id ? 'rgba(255,255,255,0.25)' : 'transparent', color: 'white', border: '1px solid rgba(255,255,255,0.3)', borderRadius: 8, padding: '4px 10px', fontSize: 11, cursor: 'pointer', fontWeight: filter === f.id ? 700 : 400 }}>
                {f.label}
              </button>
            ))}
          </div>
          <button onClick={() => setShowKpi(k => !k)} style={{ background: 'rgba(255,255,255,0.15)', color: 'white', border: '1px solid rgba(255,255,255,0.3)', borderRadius: 8, padding: '4px 10px', fontSize: 11, cursor: 'pointer' }}>Métricas</button>
          <button onClick={resetDemo} style={{ background: 'rgba(255,255,255,0.15)', color: 'white', border: '1px solid rgba(255,255,255,0.3)', borderRadius: 8, padding: '4px 10px', fontSize: 11, cursor: 'pointer' }}>↺ Reset</button>
          <div style={{ background: 'rgba(255,255,255,0.2)', borderRadius: 8, padding: '4px 10px', fontSize: 11, color: 'white', display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#4ade80', display: 'inline-block' }} />
            Ana García
          </div>
        </div>
      </div>

      {/* KPI bar */}
      {showKpi && <KpiBar kpi={kpi} show={showKpi} onToggle={() => setShowKpi(k => !k)} />}

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        {/* Conversation list */}
        <div style={{ width: 320, background: 'white', borderRight: '1px solid #e9ecef', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
          {/* Search */}
          <div style={{ padding: '10px 12px', borderBottom: '1px solid #f0f2f5' }}>
            <div style={{ position: 'relative' }}>
              <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#9ca3af', fontSize: 14 }}>⌕</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar conversación..."
                style={{ width: '100%', border: '1px solid #e5e7eb', borderRadius: 20, padding: '8px 12px 8px 32px', fontSize: 13, outline: 'none', background: '#f9fafb' }} />
              {search && <button onClick={() => setSearch('')} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: '#9ca3af', fontSize: 14 }}>×</button>}
            </div>
          </div>
          {/* Conv list */}
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {filteredConvs.length === 0 && (
              <div style={{ padding: 24, textAlign: 'center', color: '#9ca3af', fontSize: 13 }}>No hay conversaciones{search ? ` con "${search}"` : ''}</div>
            )}
            {filteredConvs.map(c => (
              <ConvItem key={c.id} conv={c} selected={c.id === selId} onClick={() => selectConv(c.id)} />
            ))}
          </div>
          {/* Scenario panel */}
          <ScenarioPanel onActivate={activateScenario} />
        </div>

        {/* Chat area */}
        <ChatPanel
          conv={selConv}
          onSend={sendMsg}
          onTakeControl={takeControl}
          onReturnBot={returnBot}
          showProfile={showProfile}
          onToggleProfile={() => setShowProfile(p => !p)}
          onExport={exportConv}
        />

        {/* Client profile */}
        {showProfile && selConv && (
          <ClientPanel conv={selConv} onAddTag={addTag} onUpdateNote={updateNote} onClose={() => setShowProfile(false)} />
        )}
      </div>

      {/* Phone FAB */}
      <button onClick={() => setShowPhone(true)} title="Simulador de cliente WhatsApp"
        style={{ position: 'fixed', bottom: 24, left: 24, width: 56, height: 56, borderRadius: '50%', background: '#25d366', color: 'white', border: 'none', cursor: 'pointer', fontSize: 24, boxShadow: '0 4px 16px rgba(37,211,102,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100, transition: 'transform 0.2s' }}
        onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.1)'}
        onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.53 5.845L0 24l6.345-1.499A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm5.894 16.634c-.247.693-1.448 1.322-1.995 1.378-.547.056-1.05.253-3.548-.74-3.006-1.187-4.93-4.27-5.08-4.47-.148-.2-1.204-1.603-1.204-3.057s.76-2.168 1.03-2.461c.268-.294.585-.367.78-.367.196 0 .39.002.562.01.18.008.422-.068.66.505.247.587.84 2.04.914 2.188.073.148.122.32.025.515-.098.196-.147.317-.294.49-.147.172-.31.384-.44.516-.147.147-.3.307-.13.602.171.294.761 1.254 1.634 2.03 1.122 1.002 2.07 1.312 2.365 1.46.294.147.465.123.636-.074.171-.196.733-.854.929-1.148.196-.294.39-.245.66-.147.27.098 1.716.81 2.012.957.294.147.49.22.562.343.073.122.073.71-.174 1.404z"/>
        </svg>
      </button>

      {/* Phone simulator modal */}
      {showPhone && <PhoneSimulator convs={convs} onReceive={receiveMsg} onClose={() => setShowPhone(false)} />}

      {/* Toasts */}
      <Toast toasts={toasts} onDismiss={id => setToasts(t => t.filter(x => x.id !== id))} />

      {/* Bottom label */}
      <div style={{ textAlign: 'center', padding: '6px', background: 'white', borderTop: '1px solid #f0f2f5', fontSize: 11, color: '#9ca3af' }}>
        Café Aroma × DevWhats — Demo Comercial AOVA — Abre el simulador para enviar mensajes como cliente
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
